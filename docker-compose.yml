version: '3.8'

services:
  music-scraper:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./music_metadata.db:/app/music_metadata.db
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=your-production-secret-key-here
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads:
    driver: local
  database: